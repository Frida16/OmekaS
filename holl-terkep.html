<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <title>Holl Imre kutatási térkép</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      height: 100%;
    }

    #map {
      width: 100%;
      height: 700px;
    }

    .map-title {
      font-family: Arial, sans-serif;
      padding: 12px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="map-title">Holl Imre kutatási helyszínei</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const map = L.map("map").setView([47.2, 19.2], 6);

L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors"
}).addTo(map);

const places = [
  "Sümeg Templom-sűrű Sarvaly",
  "Budapest Budavári palota",
  "Sopron",
  "Nagyszeben",
  "Kolozsvár",
  "Vajdahunyad",
  "Verona",
  "Esztergom",
  "Balassagyarmat",
  "Hollókő vár",
  "Várpalota vár",
  "Eberau",
  "Kisnána vár",
  "Szombathely",
  "Narni",
  "Bodiam Castle",
  "Visegrád",
  "Budapest",
  "Pomáz",
  "Werfen",
  "Nußdorf ob der Traisen",
  "Budapest Fiáth János utca 14",
  "Wels",
  "Nürnberg",
  "Eger vár",
  "Egervár",
  "Nagyvázsony Szent Mihály-kolostor",
  "Nagyvázsony Kinizsi-vár",
  "Füzér vár",
  "Hahót Sárkánysziget",
  "Lichnice",
  "Šternberk",
  "Bátmonostor Pusztafalu"
];

async function geocode(place) {
  const url =
    "https://nominatim.openstreetmap.org/search?format=json&limit=1&q=" +
    encodeURIComponent(place);

  const response = await fetch(url);
  const data = await response.json();

  if (data.length === 0) {
    console.warn("Nincs találat:", place);
    return;
  }

  const result = data[0];
  const lat = parseFloat(result.lat);
  const lon = parseFloat(result.lon);

  L.marker([lat, lon])
    .addTo(map)
    .bindPopup(`
      <strong>${place}</strong><br>
      <small>${result.display_name}</small>
    `);
}

async function drawPlaces() {
  for (const place of places) {
    await geocode(place);
    await new Promise(resolve => setTimeout(resolve, 1000));
  }
}

drawPlaces();
</script>

</body>
</html>
